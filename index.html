<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Archer Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }
      #rotate-message {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        color: #fff;
        font-size: 20px;
        font-family: Arial, sans-serif;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        z-index: 999;
      }
      #rotate-message span {
        font-size: 48px;
      }
      @media (orientation: landscape) {
        #rotate-message {
          display: flex;
        }
        #game {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-message">
      <span>🔄</span>
      <p>画面を縦にしてください</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
